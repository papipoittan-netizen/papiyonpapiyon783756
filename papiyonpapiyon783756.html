<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>筋肉育成DX ～マッスル·オデッセイ 500の神話～</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{

  --panel:#241b2c;
  --panel2:#2f2338;
  --accent:#ff7a45;
  --accent2:#ff2e63;
  --gold:#ffd23f;
  --muted:#a99bb0;
  --good:#5ee6a0;
  --burst:#ff4500;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:radial-gradient(ellipse at top,#241832,#15111a 60%);
  color:#fff;
  font-family:"Zen Maru Gothic",sans-serif;
  text-align:center;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:4px 6px;
  transition: background 0.3s;
}
body.burst-mode {
  background: radial-gradient(ellipse at top,#4a1204,#1a0500 60%) !important;
}
#wrap{max-width:520px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:4px;flex:1;min-height:0}
h1{
  font-family:"RocknRoll One",sans-serif;
  font-size:1.1em;
  margin:2px 0;
  letter-spacing:.5px;
  background:linear-gradient(90deg,var(--gold),var(--accent),var(--accent2));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  display:inline;
}
#headerRow{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
#titleTag{
  display:inline-block;
  font-family:"RocknRoll One",sans-serif;
  background:var(--panel2);
  border:1px solid var(--accent);
  color:var(--gold);
  padding:1px 8px;
  border-radius:20px;
  font-size:.62em;
  max-width: 320px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#statbar{
  display:flex;
  justify-content:space-between;
  background:var(--panel);
  padding:4px 6px;
  border-radius:10px;
  font-size:.75em;
  gap: 2px;
}
#statbar > div{flex:1;min-width:0;}
#statbar span.label{color:var(--muted);font-size:.68em;display:block;line-height:1.1;white-space:nowrap;}
button{
  font-family:"RocknRoll One",sans-serif;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:transform .08s;
}
button:active{transform:scale(.93)}
#trainArea{position:relative}
#squatBtn{
  width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:1.05em;
  padding:10px;
  box-shadow:0 3px 0 #8a1436,0 5px 10px rgba(255,46,99,.3);
}
#squatBtn.bursting {
  background: linear-gradient(135deg, var(--gold), var(--burst)) !important;
  box-shadow: 0 3px 0 #b33000, 0 5px 15px rgba(255,69,0,0.6) !important;
  animation: pulse 0.2s infinite alternate;
}
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }
#squatBtn.punch{animation:punch .12s ease}
@keyframes punch{0%{transform:scale(1)}50%{transform:scale(1.08) rotate(-2deg)}100%{transform:scale(1)}}
.secondary{background:var(--panel2);color:var(--gold);border:1px solid var(--accent);font-size:.75em;padding:4px 6px}
.popup{
  position:absolute;
  font-family:"RocknRoll One",sans-serif;
  font-weight:700;
  color:var(--gold);
  pointer-events:none;
  animation:floatUp .8s ease-out forwards;
  font-size:.95em;
  text-shadow:0 0 5px rgba(0,0,0,.6);
}
.popup.burst-pop { color: #ff3300; font-size: 1.3em; text-shadow: 0 0 8px var(--gold); }
@keyframes floatUp{ 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.2)} }

.rowCard{
  background:var(--panel);
  border:1px solid #4a2f55;border-radius:10px;padding:6px 8px;
  display:flex;align-items:center;gap:6px;text-align:left;
}
.rowCard .info{flex:1;min-width:0}
.rowCard .btns{display:flex;flex-direction:column;gap:3px}
#bossName{font-family:"RocknRoll One",sans-serif;color:var(--accent2);font-size:.82em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#bossFlavor{color:var(--muted);font-size:.65em;margin:1px 0 2px}
#bossBarOuter{background:#3a2a44;border-radius:6px;height:7px;overflow:hidden}
#bossBarInner{background:linear-gradient(90deg,var(--accent2),var(--accent));height:100%;width:0%;transition:width .3s}
#flash{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(.5);
  font-family:"RocknRoll One",sans-serif;font-size:2em;color:var(--gold);
  text-shadow:0 0 20px #000,0 0 10px var(--accent2);
  opacity:0;pointer-events:none;z-index:50;
}
#flash.show{animation:flashIn 1s ease-out forwards}
@keyframes flashIn{ 0%{opacity:0;transform:translate(-50%,-50%) scale(.3)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.3)} }
.shake{animation:shake .35s}
@keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} }
#gachaCard .info{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap}
#gachaCard h3{margin:0;font-size:.82em}
#gachaBookEl{font-size:.7em;line-height:1.4;max-height:32px;overflow-y:auto;flex-basis:100%}
.bookItem{display:inline-block;background:var(--panel2);border-radius:6px;padding:0 4px;margin:1px;font-size:.9em;border:1px solid #3a2a44;}
.g-n{color:var(--muted);border-color:#4a4050}
.g-r{color:#8fd0ff;border-color:#3a6a8f}
.g-sr{color:var(--gold);border-color:#8f7a2a}
.g-ssr{color:var(--accent2);border-color:var(--accent2);box-shadow:0 0 6px rgba(255,46,99,.4)}
.g-ur{color:#e066ff;border-color:#e066ff;box-shadow:0 0 10px rgba(224,102,255,0.6);font-weight:900}
#gachaBtn:disabled, #gacha10Btn:disabled{opacity:.4;cursor:not-allowed}
h3.sect{font-family:"RocknRoll One",sans-serif;color:var(--muted);font-size:.72em;margin:1px 0;text-align:left}
#shopWrap{min-height:0}
#shops{display:flex;overflow-x:auto;flex-wrap:nowrap;gap:5px;padding-bottom:2px}
.card{flex:0 0 auto;background:var(--panel);border:1px solid #3a2a44;padding:5px;border-radius:8px;width:80px;font-size:.65em;}
.card .iname{font-weight:700;min-height:2.2em;display:flex;align-items:center;justify-content:center;font-size:.9em}
.card .idesc{color:var(--muted);font-size:.8em;min-height:2em;overflow:hidden;}
.card button{width:100%;margin:2px 0 0;padding:2px;font-size:.8em;background:var(--panel2);color:var(--gold);border:1px solid var(--accent);}
.card button.afford{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
#logWrap{flex:1;min-height:0;display:flex;flex-direction:column}
#log{flex:1;min-height:0;overflow-y:auto;padding:3px 6px;background:var(--panel);border:1px solid #3a2a44;border-radius:8px;text-align:left;font-size:.7em;}
.logline{padding:1px 3px;border-radius:4px;margin:1px 0}
.l-crit{background:rgba(255,122,69,.15);color:var(--accent)}
.l-event{background:rgba(255,46,99,.12);color:#ff8fae}
.l-levelup{background:rgba(255,210,63,.15);color:var(--gold)}
.l-boss{background:rgba(255,46,99,.2);color:#fff}
.l-fail{background:rgba(120,120,120,.15);color:var(--muted)}
.l-reborn{background:rgba(94,230,160,.15);color:var(--good)}
.l-burst{background:rgba(255,69,0,0.25);color:#ff4500;font-weight:bold}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.skill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%;margin-top:2px;}
.skill-btn{padding:4px 2px;font-size:0.62em;background:#332244;color:#fff;border:1px solid #553377;border-radius:6px;position:relative;}
.skill-btn:disabled{opacity:0.6;color:var(--muted);cursor:not-allowed;}
.skill-btn .cd-overlay{position:absolute;top:0;left:0;height:100%;width:0%;background:rgba(0,0,0,0.5);border-radius:6px;transition:width 0.1s linear;}
.drop-badge{display:inline-block;font-size:0.58em;background:#441155;border:1px solid #e066ff;padding:1px 4px;border-radius:4px;margin-top:1px;}
footer{color:var(--muted);font-size:.58em;margin:1px 0 0;display:flex;justify-content:space-between;align-items:center;}
.clear-btn{background:none;border:none;color:#ff2e63;font-size:1em;cursor:pointer;padding:0;}
</style>
</head>
<body>
<div id="wrap">

<div id="headerRow">
  <h1>💪 筋肉育成DX</h1>
  <div id="titleTag">称号：<span id="titleText">無の極み</span></div>
</div>

    <button id="sk2" class="skill-btn" onclick="useSkill(2)">📐 サイドチェスト<br>(ボスHP減)<div id="cd2" class="cd-overlay"></div></button>
    <button id="sk3" class="skill-btn" onclick="useSkill(3)">👐 ラットスプレッド<br>(安売り)<div id="cd3" class="cd-overlay"></div></button>
  </div>
</div>

<div class="grid-2">
  <div id="bossCard" class="rowCard">
    <div class="info">
      <div id="bossName">👹 ???</div>
      <div id="bossFlavor">気配を感じる…</div>
      <div id="bossBarOuter"><div id="bossBarInner"></div></div>

    <div class="info">

      <span id="shakeBuffTimer" style="font-size:0.65em;color:var(--good);font-weight:bold;"></span>
    </div>
    <div class="btns">
      <button id="craftBtn" class="secondary" style="background:#114433;border-color:var(--good);" onclick="craftProtein()">混ぜる</button>
    </div>
  </div>
</div>

<div id="gachaCard" class="rowCard">
  <div class="info">
    <h3>🎰筋肉ガチャ（💎<span id="gcost">1</span>）<span style="font-size:0.75em;color:#e066ff;">マッスル調整版</span></h3>
    <div id="gachaBookEl">まだ何も出ていない…</div>
  </div>
  <div class="btns">
    <button id="gachaBtn" class="secondary" onclick="gacha(1)">1回</button>
    <button id="gacha10Btn" class="secondary" style="color:#e066ff;" onclick="gacha(10)">10連</button>
  </div>
</div>

<div id="shopWrap">
<h3 class="sect">筋肉ショップ（横スクロール）</h3>
<div id="shops"></div>
</div>

<div id="logWrap">
<h3 class="sect">冒険ログ</h3>
<div id="log"></div>
</div>

<footer>
  <span>💾 オートセーブ対応</span>
  <button class="clear-btn" onclick="clearData()">❌ データ全消去</button>
</footer>
</div>

<div id="flash"></div>

function saveGame() {
  localStorage.setItem("muscle_st_v7_nr", JSON.stringify(st));
  localStorage.setItem("muscle_book_v7_nr", JSON.stringify(gachaBook));
}
function loadGame() {
  let savedSt = localStorage.getItem("muscle_st_v7_nr");
  let savedBook = localStorage.getItem("muscle_book_v7_nr");
  if(savedSt) st = Object.assign(st, JSON.parse(savedSt));
  if(savedBook) gachaBook = JSON.parse(savedBook);
}

function clearData() {
  if(confirm("全ての筋肉の記憶を消去して一般人に戻りますか？（レベルもリセットされます）")) {
    localStorage.clear();
    st = {
      pow:0, lv:1, bLv:1, pps:0, g:0, m:1, b:0, 
      it:[0,0,0,0,0,0,0], 
      bonusClick:0, burstTimer:0,
      skCD:[0,0,0], skActive:[0,0,0],
      drops:{gymPass:false, weights:false, timerExt:false},
      shakeTimer:0
    };
    gachaBook = {};
    location.reload();
  }
}

function need(){
  return Math.floor(Math.pow(st.lv, 2.5) * 100);
}

function bossHp(){
  let hp = Math.floor(Math.pow(st.bLv, 2.3) * 150);
  if(st.bLv % 50 === 0) hp *= 2.5; 
  if(st.skActive[1] > 0) hp = Math.floor(hp * 0.6); 
  return hp;
}

  if(st.bLv === 50) return {name:"🏢エリアボス：ジムの出禁魔人", flavor:"【確定ドロップ:ジムの永久パス】ショップの上昇コスト緩和！"};
  if(st.bLv === 100) return {name:"🌌エリアボス：マッスル·ゴッド", flavor:"【確定ドロップ:神の神域ウェイト】10連ガチャ制限解除"};
  if(st.bLv === 150) return {name:"🌟世界ボス：終焉を告げるマッチョ", flavor:"【確定ドロップ:時空のシェイカー】スキル効果時間2倍"};
  if(st.bLv % 10 === 0) return {name:"⚠️最終試練：昨日の自分", flavor:"勝てばダイヤが超大量。"};
  
  const a = bossAdj[(st.bLv + st.b) % bossAdj.length];
  const n = bossNoun[(st.bLv * 3 + st.m) % bossNoun.length];
  return {name:"👹" + a + n, flavor:"闘気Lv" + st.bLv + "相当"};
}

function title(){
  const tier = titleTiers.find(t=>st.lv<t.max);
  return tier ? tier.name : titleTiers[titleTiers.length-1].name;
}

function randomAdventureLog(cls){
 const p=pick(logPrefix),s=pick(logSubjects),a=pick(logActions),r=pick(logResults);
 msg(`${p} ${s}が${a}。${r}`,cls);
}

function generateLog(bases, cls) {
  const prefix = pick(logPrefix);
  const body = pick(bases);
  msg(`${prefix} ${body}`, cls);
}

function msg(t,cls){
  const line = document.createElement('div');
  line.className = 'logline ' + (cls||'');
  line.textContent = t;
  log.prepend(line);
  while(log.children.length>40) log.removeChild(log.lastChild);
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function flash(text){
  const f = document.getElementById('flash');
  f.textContent = text;
  f.classList.remove('show');
  void f.offsetWidth;
  f.classList.add('show');
}

function popup(text, x, y, isBurst=false){
  const area = document.getElementById('trainArea');
  const el = document.createElement('div');
  el.className = 'popup' + (isBurst ? ' burst-pop' : '');
  el.textContent = text;
  el.style.left = x+'px';
  el.style.top = y+'px';
  area.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

function getMuscleMemoryBonus() {
  return Object.values(gachaBook).reduce((a, b) => a + b, 0);
}

function clickPower(){ 
  let lvBonus = Math.floor(Math.pow(st.lv, 2) * 0.5);
  let basePower = 1 + st.bonusClick + (getMuscleMemoryBonus() * 5) + lvBonus; 
  if (st.burstTimer > 0 || st.skActive[0] > 0) {
    basePower *= 5; 
  }
  return basePower;
}

function draw(){
  p.textContent = Math.floor(st.pow);
  l.textContent = st.lv;
  
  clPowerDisplay.textContent = clickPower();
  
  let ppsText = st.pps + (getMuscleMemoryBonus() * 10); 
  if(st.shakeTimer > 0) ppsText *= 2;
  s.textContent = ppsText + (st.burstTimer > 0 ? " (🔥BURST!)" : "") + (st.shakeTimer > 0 ? " (🧪SHAKE!)" : "");
  
  g.textContent = st.g;
  titleText.textContent = title();

  let dropsText = "所持バフ: ";
  if(st.drops.gymPass) dropsText += "🎫店安 ";
  if(st.drops.weights) dropsText += "🏋️10連解放 ";
  if(st.drops.timerExt) dropsText += "⏳スキル延長 ";
  if(dropsText === "所持バフ: ") dropsText = "レアドロップ未所持";
  dropStatus.textContent = dropsText;

  shops.innerHTML = "";
  for(let i=0;i<itemMeta.length;i++){
    let rate = st.drops.gymPass ? 1.35 : 1.5;
    let c = Math.floor(base[i]*Math.pow(rate, st.it[i]));
    if(st.skActive[2] > 0) c = Math.floor(c * 0.8);

    const meta = itemMeta[i];
    const desc = meta.desc[st.it[i] % meta.desc.length];
    const canAfford = st.pow >= c;
    shops.innerHTML += `<div class="card">
      <div class="iname">${meta.name}</div>
      <div class="idesc">${desc}</div>
      <div>Lv${st.it[i]}·+${add[i]}/秒</div>
      <button class="${canAfford?'afford':''}" onclick="buy(${i})">${c}</button>
    </div>`;
  }

  gachaBtn.disabled = st.g < gachaCost;
  gachaBtn.classList.toggle('afford', st.g >= gachaCost);
  
  gacha10Btn.disabled = st.g < (gachaCost * 10);
  gacha10Btn.classList.toggle('afford', st.g >= (gachaCost * 10));

  drawGachaBook();

  const bi = bossInfo();
  bossName.textContent = bi.name;
  bossFlavor.textContent = bi.flavor + ` 必要:${bossHp()}`;
  const ratio = Math.min(100, Math.floor(100*st.pow/bossHp()));
  bossBarInner.style.width = ratio+"%";

  let leveled=false;
  while(st.pow >= need()){
    st.lv++;
    leveled=true;
  }
  if(leveled){
    msg(`🎉Lv${st.lv}にアップ！称号：「${title()}」 クリック力が超成長！`, 'l-levelup');
    l.textContent = st.lv;
    titleText.textContent = title();
  }
  
  for(let i=1; i<=3; i++){
    let btn = document.getElementById('sk'+i);
    let cdEl = document.getElementById('cd'+i);
    if(st.skActive[i-1] > 0){
      btn.style.background = "#ff4500";
      cdEl.style.width = "0%";
    } else if(st.skCD[i-1] > 0){
      btn.style.background = "#221133";
      let maxCD = i===1 ? 30 : (i===2 ? 20 : 40);
      cdEl.style.width = (st.skCD[i-1] / maxCD * 100) + "%";
    } else {
      btn.style.background = "#5522aa";
      cdEl.style.width = "0%";
    }
  }

  if(st.shakeTimer > 0){
    shakeBuffTimer.textContent = `🧪残り ${st.shakeTimer}s (PPS 2倍!)`;
  } else {
    shakeBuffTimer.textContent = "";
  }
  
  saveGame();
}

function clickTrain(e){
  st.pow += clickPower();
  const btn = document.getElementById('squatBtn');
  btn.classList.remove('punch'); void btn.offsetWidth; btn.classList.add('punch');

  let gained = clickPower();
  
  if(st.burstTimer <= 0 && Math.random() < 0.03){
    st.burstTimer = st.drops.timerExt ? 20 : 10; 
    msg("🔥バルクアップ·バースト発動！全筋肉細胞が超活性化（クリック5倍）！", "l-burst");
    flash("BULK UP BURST!!");
    document.body.classList.add('burst-mode');
    document.getElementById('squatBtn').classList.add('bursting');
  }

  // 🍑クリック時ログ（バリエーション2倍化適用部分）
  if(Math.random() < 0.05){
    const crit = 100;
    st.pow += crit;
    gained += crit;
    generateLog(critBases, 'l-crit');
  } else if(Math.random() < 0.02){
    generateLog(flavorBases);
  }

  if(e){
    const rect = btn.getBoundingClientRect();
    const areaRect = document.getElementById('trainArea').getBoundingClientRect();
    const x = rect.left - areaRect.left + rect.width/2 + (Math.random()*40-20);
    const y = rect.top - areaRect.top - 6;
    popup('+'+gained, x, y, (st.burstTimer > 0 || st.skActive[0] > 0));
  }

  draw();
}

function useSkill(num){
  if(st.skCD[num-1] > 0 || st.skActive[num-1] > 0) return;
  let duration = [5, 1, 10][num-1];
  if(st.drops.timerExt) duration *= 2; 
  st.skActive[num-1] = duration;
  
  if(num === 1) msg("✊ ポーズ『ダブルバイセップス』！クリック力が5倍になった！");
  if(num === 2) msg("📐 ポーズ『サイドチェスト』！次のボスの体力を構造破断させた！");
  if(num === 3) msg("👐 ポーズ『ラットスプレッド』！商品価格を20%割引させた！");
  draw();
}

buy=(i)=>{
  let rate = st.drops.gymPass ? 1.35 : 1.5;
  let c = Math.floor(base[i]*Math.pow(rate, st.it[i]));
  if(st.skActive[2] > 0) c = Math.floor(c * 0.8);

  if(st.pow >= c){
    st.pow -= c;
    st.it[i]++;
    st.pps += add[i];
    msg(`🛒${itemMeta[i].name}を導入！毎秒+${add[i]}`);
    draw();
  }
}

function craftProtein(){
  let fCount = gachaBook["ペットボトルのフタ"] || 0;
  let sCount = gachaBook["片方だけの靴下"] || 0;
  if(fCount >= 5 && sCount >= 5){
    gachaBook["ペットボトルのフタ"] -= 5;
    gachaBook["片方だけの靴下"] -= 5;
    st.shakeTimer += 30; 
    msg("🧪 ハズレ素材をシェイク！最高級特製マッスルカクテルが完成！30秒間PPSが2倍！", "l-reborn");
    flash("PROTEIN SHAKE!");
    draw();
  } else {
    msg("❌ 素材が足りない！(ガチャのハズレ枠のフタと靴下が5個ずつ必要です)", "l-fail");
  }
}

setInterval(()=>{
  let ppsGain = st.pps + (getMuscleMemoryBonus() * 10);
  if (st.shakeTimer > 0) ppsGain *= 2; 
  if (st.burstTimer > 0) ppsGain *= 1.5; 
  st.pow += ppsGain;

  if (st.burstTimer > 0) {
    st.burstTimer--;
    if (st.burstTimer <= 0) {
      document.body.classList.remove('burst-mode');
      document.getElementById('squatBtn').classList.remove('bursting');
      msg("💥バルクアップ·バーストが終了した。");
    }
  }
  if (st.shakeTimer > 0) st.shakeTimer--;

  for(let i=0; i<3; i++){
    if(st.skActive[i] > 0){
      st.skActive[i]--;
      if(st.skActive[i] <= 0){
        st.skCD[i] = [30, 20, 40][i]; 
        msg(`⏳ スキル [${i+1}] の効果が切れ、クールダウンに入りました。`);
      }
    } else if(st.skCD[i] > 0){
      st.skCD[i]--;
    }
  }

  if(st.pps > 0 && Math.random() < 0.08){
    clickTrain();
  }

  if(Math.random() < 0.02){
    if(Math.random()<0.7){randomAdventureLog('l-event')}else{generateLog(eventBases,'l-event');}
  }
  draw();
} , 1000);

function boss(){
  const hp = bossHp();
  const bi = bossInfo();
  if(st.pow >= hp){
    let gGain = 1;
    if(st.bLv % 10 === 0) gGain *= 5; 
    st.g += gGain;
    
    const winPrefix = pick(logPrefix);
    const winBody = pick(bossWinBases);
    msg(`${winPrefix} ${bi.name}に勝利！${winBody} 💎+${gGain}`, 'l-boss');
    
    if(st.bLv === 50 && !st.drops.gymPass) { st.drops.gymPass = true; msg("🎉レアドロップ【ジムの永久パス】を獲得！", "l-levelup"); }
    if(st.bLv === 100 && !st.drops.weights) { st.drops.weights = true; msg("🎉レアドロップ【神の神域ウェイト】を獲得！", "l-levelup"); }
    if(st.bLv === 150 && !st.drops.timerExt) { st.drops.timerExt = true; msg("🎉レアドロップ【時空のシェイカー】を獲得！", "l-levelup"); }

    flash('討伐成功!!');
    st.bLv++; 
    
    if(st.skActive[1] > 0) st.skActive[1] = 0; 
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'), 350);
  } else {
    const losePrefix = pick(logPrefix);
    const loseBody = pick(bossLoseBases);
    msg(`${losePrefix} ${bi.name}に敗北：${loseBody} (筋力は維持された！)`, 'l-fail');
    flash('敗北…');
  }
  draw();
}

function weightedPick(pool){
  const total = pool.reduce((s,i)=>s+i.weight,0);
  let r = Math.random()*total;
  for(const item of pool){
    if(r < item.weight) return item;
    r -= item.weight;
  }
  return pool[pool.length-1];
}

function gacha(times){
  let cost = gachaCost * times;
  if(st.g < cost){
    msg(`💎が足りない…`, 'l-fail');
    return;
  }
  st.g -= cost;
  
  let hasSSR = false;
  let hasUR = false;

  for(let t=0; t<times; t++){
    const item = weightedPick(gachaPool);
    item.effect(st);
    gachaBook[item.name] = (gachaBook[item.name]||0) + 1;
    
    if(item.rarity === "SSR" && item.name === "黄金の腹筋伝説") hasSSR = true;
    if(item.rarity === "🌈") hasSSR = true; // 虹色プロテイン
    if(item.rarity === "UR") hasUR = true;

    const rarityTag = {N:"", R:"【R】", SR:"【SR!】", SSR:"★【SSR!!】★", UR:"🌌【⚡UR超越神話⚡】🌌"}[item.rarity] || "★【SSR!!】★";
    msg(`🎰 ${rarityTag}${item.icon}${item.name} （${item.text}）`, 'l-gacha ' + rarityClass[item.rarity==='🌈'?'SSR':item.rarity]);
  }

  if(hasUR){
    flash('🚨UR神話確定演出!!!!🚨');
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'), 600);
  } else if(hasSSR){
    flash('SSR確定演出!!');
  }
  draw();
}

function drawGachaBook(){
  const entries = Object.keys(gachaBook);
  if(entries.length === 0){
    gachaBookEl.textContent = "まだ何も出ていない…";
    return;
  }
  gachaBookEl.innerHTML = entries.map(name=>{
    if(gachaBook[name] <= 0) return "";
    const meta = gachaPool.find(g=>g.name===name);
    const rClass = rarityClass[meta.rarity==='🌈'?'SSR':meta.rarity];
    return `<span class="bookItem ${rClass}">${meta.icon}×${gachaBook[name]}</span>`;
  }).join(' ');
}

if(!st.hasOwnProperty('bLv')) st.bLv = st.lv; 
loadGame();
gcost.textContent = gachaCost;
draw();
